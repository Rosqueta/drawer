<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SL Support — Image Editor</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/<unique-path>/script.js"></script>
</head>
<body>

  <!-- WORKSPACE (full screen) -->
  <main class="workspace">

    <!-- Empty state: drag & drop -->
    <div class="dropzone" id="dropzone">
      <div class="dropzone__content">
        <div class="dropzone__icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="4" y="4" width="40" height="40" rx="10" fill="#EEF1FF"/>
            <rect x="12" y="14" width="24" height="20" rx="3" stroke="#849FFF" stroke-width="2"/>
            <circle cx="18" cy="21" r="2.5" fill="#849FFF"/>
            <path d="M12 28l7-6 5 5 3-3 6 6" stroke="#849FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="dropzone__label">Drop your screenshot here</p>
        <p class="dropzone__paste-hint">or paste with <kbd>⌘V</kbd> / <kbd>Ctrl+V</kbd></p>
        <div class="dropzone__options">
          <label class="btn btn--secondary" for="file-input">Select image</label>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden />
      </div>
    </div>

    <!-- Image loaded: canvas -->
    <div class="canvas-wrapper" id="canvas-wrapper" hidden>
      <canvas id="canvas"></canvas>
    </div>

  </main>

  <!-- LOGO (floating, top left) -->
  <div class="float-logo">
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#9DB2FF"/>
      <path d="M25.0008 14.8439V17.1534H17.824C17.4539 17.1534 17.1541 17.4532 17.1541 17.8232V25H14.8447V18.7848L10.45 23.1795L8.81858 21.5453L13.2132 17.1507H6.99805V14.8412H13.2105L8.81858 10.452L10.45 8.81783L14.8447 13.2125V7H17.1541V13.2152L21.5488 8.82053L23.1802 10.4547L18.7883 14.8466H25.0035L25.0008 14.8439Z" fill="#0D423E"/>
      <path d="M19.4614 19.4593L19.4595 19.4612C19.0094 19.912 19.0099 20.6422 19.4607 21.0923L21.0317 22.6612C21.4825 23.1113 22.2127 23.1108 22.6628 22.6601L22.6647 22.6582C23.1148 22.2074 23.1143 21.4772 22.6636 21.0271L21.0925 19.4582C20.6418 19.0081 19.9115 19.0086 19.4614 19.4593Z" fill="#0D423E"/>
    </svg>
    <img src="logo-drawer@2x.png" alt="drawer" width="82" height="18" style="display:block;">
  </div>

  <!-- ACTIONS (floating, top right) -->
  <div class="float-actions">
    <label class="tool-btn tool-btn--float" id="btn-new-image" for="file-input-replace" data-tooltip-below="New image" hidden>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </label>
    <input type="file" id="file-input-replace" accept="image/*" hidden />
    <div class="share-dropdown">
      <button class="btn btn--primary" id="btn-share">
        Share
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="share-menu" id="share-menu" hidden>
        <button class="share-menu__item" id="btn-copy">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
            <rect x="6" y="6" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 6V4.5A1.5 1.5 0 0010.5 3h-6A1.5 1.5 0 003 4.5v6A1.5 1.5 0 004.5 12H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Copy image
        </button>
        <button class="share-menu__item" id="btn-export">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
            <path d="M9 3v9M5 8l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Download PNG
        </button>
      </div>
    </div>
  </div>

  <!-- Drag & drop overlay (replace image) -->
  <div class="drop-overlay" id="drop-overlay" hidden>
    <div class="drop-overlay__pill">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 3v10M5 8l5-5 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Drop to replace image
    </div>
  </div>

  <!-- ZOOM CONTROLS (floating, bottom right) -->
  <div class="zoom-controls" id="zoom-controls" hidden>
    <button class="zoom-btn" id="btn-zoom-out" data-tooltip="Zoom out (-)">−</button>
    <button class="zoom-btn" id="btn-zoom-in" data-tooltip="Zoom in (+)">+</button>
    <span id="zoom-value" hidden>100%</span>
  </div>

  <!-- CROP BAR (floating, appears when cropping) -->
  <div id="crop-bar" class="crop-bar" hidden>
    <span class="crop-bar__hint">Drag to select the area to crop</span>
    <div class="crop-bar__actions">
      <button id="btn-crop-cancel" class="crop-bar__btn">Cancel</button>
      <button id="btn-crop-confirm" class="crop-bar__btn crop-bar__btn--primary" disabled>Apply crop</button>
    </div>
  </div>

  <!-- TOOLBAR (floating, bottom center) -->
  <footer class="toolbar-bar">
    <div class="toolbar" id="toolbar">

      <!-- Annotation tools -->
      <div class="toolbar__group">
        <button class="tool-btn" data-tool="select" data-tooltip="Select (V)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M4 2l10 7-5.5 1.5L7 16 4 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="rect" data-tooltip="Rectangle (R)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="4" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="arrow" data-tooltip="Arrow (A)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M4 14L13 5M13 5H8M13 5v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="blur" data-tooltip="Blur (B)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
            <circle cx="9" cy="9" r="2.5" fill="currentColor" opacity="0.4"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="text" data-tooltip="Text (T)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 4.5h12M9 4.5V14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="step" data-tooltip="Step (S)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <text x="1" y="7.5" font-size="6.5" font-weight="700" fill="currentColor">1</text>
            <line x1="8" y1="5.5" x2="16.5" y2="5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <text x="1" y="14.5" font-size="6.5" font-weight="700" fill="currentColor">2</text>
            <line x1="8" y1="12.5" x2="16.5" y2="12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="crop" data-tooltip="Crop (C)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M5 1v12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 5h12v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="tool-btn" id="btn-callout" data-tooltip="Message (M)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M15 3H3a1 1 0 00-1 1v9a1 1 0 001 1h3l2 2 2-2h5a1 1 0 001-1V4a1 1 0 00-1-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M6 7h6M6 10h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="toolbar__divider"></div>

      <!-- Padding -->
      <div class="toolbar__group toolbar__group--padding">
        <span class="toolbar__label">Padding</span>
        <div class="seg-ctrl">
          <span class="seg-ctrl__thumb"></span>
          <button class="seg-ctrl__btn" data-padding="40">S</button>
          <button class="seg-ctrl__btn active" data-padding="80">M</button>
          <button class="seg-ctrl__btn" data-padding="140">L</button>
        </div>
      </div>

      <div class="toolbar__divider"></div>

      <!-- Border radius -->
      <div class="toolbar__group toolbar__group--radius">
        <span class="toolbar__label">Corners</span>
        <div class="seg-ctrl">
          <span class="seg-ctrl__thumb"></span>
          <button class="seg-ctrl__btn active" data-radius="8" data-tooltip="Soft corners (8px)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="1" y="1" width="12" height="12" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
          <button class="seg-ctrl__btn" data-radius="16" data-tooltip="Round corners (16px)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="1" y="1" width="12" height="12" rx="4.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </footer>

  <!-- HISTORY CONTROLS (floating, bottom left) -->
  <div class="history-controls" id="history-controls" hidden>
    <button class="zoom-btn" id="btn-undo" data-tooltip="Undo (Ctrl+Z)">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M4 8H11a4 4 0 010 8H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M7 5L4 8l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="zoom-btn" id="btn-redo" data-tooltip="Redo (Ctrl+Y)">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M14 8H7a4 4 0 000 8h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M11 5l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- CALLOUT BUILDER (floating panel) -->
  <div class="callout-builder" id="callout-builder" hidden>
    <div class="callout-builder__header">
      <span class="callout-builder__title">Message</span>
      <button class="callout-builder__close" id="callout-builder-close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="callout-builder__types">
      <button class="callout-type-btn active" data-callout-type="note">
        <span class="callout-type-dot" style="background:#849FFF"></span>Note
      </button>
      <button class="callout-type-btn" data-callout-type="tip">
        <span class="callout-type-dot" style="background:#FFD15D"></span>Tip
      </button>
      <button class="callout-type-btn" data-callout-type="warning">
        <span class="callout-type-dot" style="background:#FF9365"></span>Warning
      </button>
    </div>
    <textarea class="callout-builder__textarea" id="callout-text" placeholder="Write your message here…" rows="3"></textarea>
    <div class="callout-builder__preview-label">Preview</div>
    <div class="callout-builder__preview" id="callout-preview"></div>
    <button class="callout-builder__copy-btn" id="callout-copy-btn">
      <svg width="15" height="15" viewBox="0 0 18 18" fill="none">
        <rect x="6" y="6" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 6V4.5A1.5 1.5 0 0010.5 3h-6A1.5 1.5 0 003 4.5v6A1.5 1.5 0 004.5 12H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Copy HTML
    </button>
  </div>

  <!-- TEXT INPUT OVERLAY -->
  <div id="text-input-wrapper" hidden>
    <textarea id="text-input-field" class="text-input-field"
              autocomplete="off" spellcheck="false" placeholder="Type label…"
              rows="1" wrap="off"></textarea>
    <span id="text-input-sizer" class="text-input-sizer" aria-hidden="true"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
